<div class="container-fluid vh-100">
  <div class="row h-100">
    <div class="col-lg-6 d-none d-lg-block bg-primary bg-gradient">
      <div class="d-flex h-100 align-items-center justify-content-center">
        <div class="text-center text-white">
          <i class="fas fa-shield-alt fa-5x mb-4"></i>
          <h1 class="display-4 fw-bold">Insurance Broker System</h1>
          <p class="lead">Comprehensive management solution for insurance brokerage operations</p>
        </div>
      </div>
    </div>
    
    <div class="col-lg-6">
      <div class="d-flex h-100 align-items-center justify-content-center">
        <div class="card shadow-lg" style="width: 400px;">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="fas fa-shield-alt fa-3x text-primary mb-3"></i>
              <h3 class="card-title">Sign In</h3>
              <p class="text-muted">Enter your credentials to access the system</p>
            </div>
            
            <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-user"></i></span>
                  <input 
                    type="text" 
                    class="form-control" 
                    id="username" 
                    name="username" 
                    [(ngModel)]="credentials.username"
                    required
                    placeholder="Enter your username">
                </div>
              </div>
              
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="fas fa-lock"></i></span>
                  <input 
                    type="password" 
                    class="form-control" 
                    id="password" 
                    name="password" 
                    [(ngModel)]="credentials.password"
                    required
                    placeholder="Enter your password">
                </div>
              </div>
              
              <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label" for="rememberMe">Remember me</label>
              </div>
              
              <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginForm.invalid || isLoading">
                  <span *ngIf="!isLoading">Sign In</span>
                  <span *ngIf="isLoading">
                    <span class="spinner-border spinner-border-sm me-2" role="status"></span>
                    Signing in...
                  </span>
                </button>
              </div>
              
              <div class="mt-3 text-center">
                <small class="text-muted">
                  Demo credentials: admin / password
                </small>
              </div>
            </form>
            
            <div class="alert alert-danger mt-3" *ngIf="errorMessage">
              <i class="fas fa-exclamation-triangle me-2"></i>
              {{ errorMessage }}
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
